services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/taskflow
      JWT_SECRET: replace-with-a-strong-secret
      JWT_EXPIRES_IN: 7d
      BCRYPT_SALT_ROUNDS: 10
      CLIENT_URL: http://localhost:5173
      CLIENT_URLS: http://localhost:5173,http://127.0.0.1:5173
      ALLOW_VERCEL_PREVIEW_ORIGINS: "false"
      GOOGLE_CLIENT_ID: ""
      LOG_LEVEL: info
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api/v1
        VITE_GOOGLE_CLIENT_ID: ""
    container_name: taskflow-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
